name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install lint tools
        run: pip install ruff mypy bandit pydantic fastapi pydantic-settings
      - name: ruff check
        run: ruff check src/ api/ tests/
      - name: mypy type check
        # Run against src/ + api/ so api/settings.py + api/main.py get type-
        # checked; `--ignore-missing-imports` prevents failures from third-
        # party libs (slowapi, xgboost, etc.) that don't ship stubs.
        run: mypy src/ api/ --ignore-missing-imports
      - name: bandit security scan
        # Skip the tests tree (B101 asserts are normal in pytest) and the
        # .venv. Fail on MEDIUM+ findings.
        run: bandit -r src/ api/ -n 3 -ll

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Run tests with coverage
        run: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=80

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt pip-audit
      - name: pip-audit (dependency vulnerability scan)
        run: pip-audit -r requirements.txt
      - name: Generate SBOM (CycloneDX JSON)
        # Software Bill of Materials — standard supply-chain artifact.
        # Mirrors the ResumeForge pattern. Stored as a 90-day CI artifact.
        run: pip-audit -r requirements.txt --format=cyclonedx-json --output=sbom.cyclonedx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-cyclonedx-${{ github.run_number }}
          path: sbom.cyclonedx.json
          retention-days: 90

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space (GH Actions runner)
        # Default runner has ~14GB free. Our builder stage pulls pandas +
        # numpy + xgboost + lightgbm + streamlit + their transitives, plus
        # GHA cache layers; buildx occasionally runs out of inodes before
        # the runtime layer is assembled. Jlumbroso's action frees ~15GB
        # by removing preinstalled Android SDK, .NET, dotnet, CodeQL, etc.
        # — tools we don't use in the build.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build multi-stage Dockerfile
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: nyc-price-prediction:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Trivy — scan built image for HIGH/CRITICAL CVEs
        # Container-layer vulnerability scan complementary to pip-audit.
        # `.trivyignore` at repo root holds managed-risk CVE IDs (starter
        # file is empty; mirrors ResumeForge pattern).
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: nyc-price-prediction:ci
          format: table
          exit-code: "1"
          severity: "HIGH,CRITICAL"
          ignore-unfixed: true
          vuln-type: "os,library"
          trivyignores: .trivyignore
      - name: Smoke-run the built image
        # Start container, poll /health, stop. Catches runtime import
        # failures + missing deps before any deploy can see the image.
        run: |
          docker run -d --name pp-smoke -p 8000:8000 nyc-price-prediction:ci
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API healthy after ${i}s"
              docker stop pp-smoke && docker rm pp-smoke
              exit 0
            fi
            sleep 1
          done
          echo "API failed to become healthy within 30s" >&2
          docker logs pp-smoke
          docker stop pp-smoke && docker rm pp-smoke
          exit 1
