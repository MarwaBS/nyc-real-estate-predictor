# Dependabot configuration (2026 industrial standard)
#
# Weekly grouped updates across pip + docker + github-actions. Matches the
# ResumeForge configuration shape — patch + minor grouped to reduce PR noise,
# majors always isolated because they tend to be breaking.

version: 2

updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      python-patch-updates:
        update-types: ["patch"]
      python-minor-updates:
        update-types: ["minor"]
    ignore:
      # Major-version bumps are breaking by definition — manage manually
      # in a dedicated branch after reading the changelog. Otherwise
      # Dependabot fires off weekly pandas 2->3 / optuna 3->4 / h3 3->4
      # style PRs that always need rejection. This rule suppresses them.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "build(docker)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 2
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
